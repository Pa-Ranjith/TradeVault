[build]
  # INSTRUCTION: Tell Netlify where the actual app lives. 
  # Since our app is inside the "frontend" folder, we set the base here.
  base = "frontend"
  
  # INSTRUCTION: The specific "Recipe" to build the app.
  # "npm run build" converts our development code into a fast, live website.
  command = "npm run build"
  
  # INSTRUCTION: Where the finished website files are stored after building.
  # Next.js puts everything in a folder called ".next".
  publish = ".next"

# This plugin makes Next.js work perfectly with Netlify's features.
[[plugins]]
  package = "@netlify/plugin-nextjs"
